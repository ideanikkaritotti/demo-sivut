<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Talent match demo</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; max-width: 1000px; }
    h1 { margin: 0 0 8px; }
    .muted { color: #666; font-size: 14px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin: 12px 0; }
    textarea { width: 100%; min-height: 170px; padding: 10px; font-size: 14px; }
    button { padding: 10px 14px; border-radius: 12px; border: 1px solid #aaa; cursor: pointer; background: #fff; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    input[type="number"] { width: 90px; padding: 6px; }
    .card { border: 1px solid #ddd; border-radius: 16px; padding: 14px; margin: 12px 0; }
    ol { line-height: 1.7; padding-left: 22px; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 8px; }
    .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; border: 1px solid #ddd; font-size: 12px; color: #444; }
    .result-item { margin: 10px 0; }
    .result-name { font-weight: 700; }
    .result-score { font-variant-numeric: tabular-nums; }
    .result-desc { color:#666; font-size:14px; margin-top:2px; white-space:pre-wrap; }
    .small { font-size: 12px; color:#777; }
  </style>
</head>
<body>
  <h1>Who would love to see your idea?</h1>
  <p class="muted">
    Idea tinder takes your idea as an input and compares it to a description of company employee using vector logic. The list contains only publicly available person descriptions in this demo version. 
  </p>

  <div class="card">
    <div class="row">
      <button id="loadBtn">Load data and AI model</button>
      <span class="pill" id="dbInfo">Data: not loaded</span>
      <span class="pill" id="modelInfo">Model: not loaded</span>
      <span class="muted" id="status"></span>
    </div>

    <label class="muted" for="idea">Idea / search:</label>
    <textarea id="idea" placeholder="Write your idea here..."></textarea>

    <div class="row">
      <label>Top K:
        <input id="topK" type="number" value="10" min="1" max="50">
      </label>
      <label class="small">
        <input id="truncate" type="checkbox" checked />
        Short descriptions (max 260 characters)
      </label>
      <button id="searchBtn" disabled>Search</button>
      <button id="clearBtn">clear</button>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0;">Results</h3>
    <ol id="results"></ol>
  </div>

  <script type="module">
    import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.1";

    const loadBtn = document.getElementById("loadBtn");
    const searchBtn = document.getElementById("searchBtn");
    const clearBtn = document.getElementById("clearBtn");

    const ideaEl = document.getElementById("idea");
    const topKEl = document.getElementById("topK");
    const truncateEl = document.getElementById("truncate");
    const resultsEl = document.getElementById("results");

    const statusEl = document.getElementById("status");
    const dbInfoEl = document.getElementById("dbInfo");
    const modelInfoEl = document.getElementById("modelInfo");

    let db = null;        // embeddings.json payload
    let extractor = null; // transformers.js pipeline

    function setStatus(msg) { statusEl.textContent = msg; }

    // embeddings ovat normalisoitu pythonissa (normalize_embeddings=True)
    // -> cosine similarity = dot product
    function dot(a, b) {
      let s = 0;
      for (let i = 0; i < a.length; i++) s += a[i] * b[i];
      return s;
    }

    function truncate(text, n = 220) {
      if (!text) return "";
      return text.length > n ? text.slice(0, n) + "…" : text;
    }

    async function loadAll() {
      setStatus("Ladataan embeddings.json…");
      const res = await fetch("./embeddings.json", { cache: "no-store" });
      if (!res.ok) throw new Error(`embeddings.json lataus epäonnistui (HTTP ${res.status})`);
      db = await res.json();

      if (!db?.items?.length) {
        throw new Error("embeddings.json näyttää tyhjältä tai väärän muotoiselta.");
      }

      const count = db.count ?? db.items.length;
      const dim = db.dim ?? (db.items[0]?.emb?.length ?? "?");
      dbInfoEl.textContent = `Data: ${count} hlö, dim=${dim}`;

      // Tarkistus: onko kuvaus mukana
      const hasDesc = typeof db.items[0]?.kuvaus === "string";
      if (!hasDesc) {
        setStatus("Huom: embeddings.json ei sisällä 'kuvaus'-kenttää vielä. Päivitä build_embeddings.py niin, että se kirjoittaa myös kuvaukset.");
      }

      setStatus("Loading model. Wait for couple seconds...");
      extractor = await pipeline("feature-extraction", "onnx-community/all-MiniLM-L6-v2-ONNX");

      modelInfoEl.textContent = "Model: loaded";
      setStatus("Ready to look for lover <3");
      searchBtn.disabled = false;
    }

    async function embedQuery(text) {
      const out = await extractor(text, { pooling: "mean", normalize: true });
      return out.data; // Float32Array
    }

    function renderResults(scored) {
      resultsEl.innerHTML = "";

      const shouldTruncate = truncateEl.checked;

      scored.forEach((r, idx) => {
        const li = document.createElement("li");
        li.className = "result-item";
        const desc = shouldTruncate ? truncate(r.kuvaus, 260) : (r.kuvaus ?? "");

        li.innerHTML = `
          <div>
            <span class="result-name">${r.nimi}</span>:
            <span class="result-score">${r.score.toFixed(3)}</span>
          </div>
          <div class="result-desc">${desc}</div>
        `;
        resultsEl.appendChild(li);
      });
    }

    async function search() {
      const idea = ideaEl.value.trim();
      if (!idea) return setStatus("Kirjoita idea ensin.");

      const topK = Math.max(1, Math.min(50, parseInt(topKEl.value || "10", 10)));

      setStatus("Lasketaan idean embedding ja etsitään…");

      const q = await embedQuery(idea);

      const scored = db.items.map(it => ({
        nimi: it.nimi,
        kuvaus: it.kuvaus,   // <- tämä tulee embeddings.json:stä
        score: dot(q, it.emb)
      }));

      scored.sort((a, b) => b.score - a.score);

      renderResults(scored.slice(0, topK));
      setStatus("Idea lover analysis ready <3");
    }

    loadBtn.addEventListener("click", async () => {
      loadBtn.disabled = true;
      try {
        await loadAll();
      } catch (e) {
        setStatus(`Virhe: ${e.message}`);
        console.error(e);
      } finally {
        loadBtn.disabled = false;
      }
    });

    searchBtn.addEventListener("click", async () => {
      searchBtn.disabled = true;
      try {
        await search();
      } catch (e) {
        setStatus(`Virhe: ${e.message}`);
        console.error(e);
      } finally {
        searchBtn.disabled = false;
      }
    });

    clearBtn.addEventListener("click", () => {
      ideaEl.value = "";
      resultsEl.innerHTML = "";
      setStatus("");
    });
  </script>
</body>
</html>
